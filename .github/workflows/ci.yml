name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # `next build` needs CONTENTFUL_* secrets (SSG fetches the catalog).
      # Vercel is the build gate today. To enable a CI build too, add
      # CONTENTFUL_SPACE_ID + CONTENTFUL_DELIVERY_TOKEN as repo secrets and
      # uncomment:
      # - name: Build
      #   run: npm run build
      #   env:
      #     CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
      #     CONTENTFUL_DELIVERY_TOKEN: ${{ secrets.CONTENTFUL_DELIVERY_TOKEN }}
