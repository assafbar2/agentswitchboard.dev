<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="2.5" fill="#00cc66"/>
  <!-- Connection spokes — switchboard feel -->
  <line x1="16" y1="7"  x2="16" y2="13.5" stroke="#00cc66" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="18.5" x2="16" y2="25" stroke="#00cc66" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7"  y1="16" x2="13.5" y2="16" stroke="#00cc66" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18.5" y1="16" x2="25"  y2="16" stroke="#00cc66" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal spokes -->
  <line x1="10" y1="10" x2="13.8" y2="13.8" stroke="#00cc66" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="10" x2="18.2" y2="13.8" stroke="#00cc66" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="22" x2="13.8" y2="18.2" stroke="#00cc66" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="22" x2="18.2" y2="18.2" stroke="#00cc66" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>
